# simple-ci default configuration
# Copy to ./ci/simple-ci.conf or ~/.config/simple-ci.conf and customize.

# Ordered list of CI hosts to try — first reachable one wins.
# Entry formats:
#   "host:http://url"       — direct HTTP, probe $url/health
#   "host:tunnel:port"      — SSH tunnel to remote port, API via localhost
# CI_HOSTS=(
#     "gpu:http://gpu:8080"
#     "home.rkroll.com:tunnel:8080"
# )

# Single-host defaults (used when CI_HOSTS is not defined or no host is reachable)
CI_HOST=gpu
CI_REMOTE_SCRIPT=~/src/simple-ci/ci-rsync.sh
CI_SERVER_URL=http://gpu:8080
